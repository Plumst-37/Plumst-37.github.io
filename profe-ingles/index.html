<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Miss Niria 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4b0082, #8a2be2, #d8b4ff);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Fondo con burbujas */
.background span {
    position: absolute;
    display: block;
    width: 20px;
    height: 20px;
    background: rgba(255,255,255,0.1);
    animation: float 10s linear infinite;
    bottom: -50px;
    border-radius: 50%;
}

@keyframes float {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-1000px) scale(1.5); opacity: 0; }
}

/* Tarjeta */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    animation: fadeIn 2s ease;
    color: white;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3.2em;
    margin: 0;
    text-shadow: 0 0 15px #fff;
}

/* Corazón premium */
.heart {
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #ff66cc, #cc00ff);
    transform: rotate(-45deg);
    margin: 30px auto;
    position: relative;
    animation: pulse 1.2s infinite;
    box-shadow: 0 0 30px #ff99ff;
}

.heart::before,
.heart::after {
    content: "";
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, #ff66cc, #cc00ff);
    border-radius: 50%;
    position: absolute;
}

.heart::before {
    top: -60px;
    left: 0;
}

.heart::after {
    left: 60px;
    top: 0;
}

@keyframes pulse {
    0% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(1.15) rotate(-45deg); }
    100% { transform: scale(1) rotate(-45deg); }
}

p {
    font-size: 1.2em;
    margin: 10px 0;
    opacity: 0.9;
}

/* Brillos */
.glow {
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 30px #ffccff, 0 0 50px #fff; }
}

</style>
</head>

<body>

<div class="background">
    <span style="left:10%; animation-delay:0s"></span>
    <span style="left:20%; animation-delay:2s"></span>
    <span style="left:30%; animation-delay:4s"></span>
    <span style="left:50%; animation-delay:1s"></span>
    <span style="left:70%; animation-delay:3s"></span>
    <span style="left:90%; animation-delay:5s"></span>
</div>

<div class="card">
    <h1 class="glow">💜 Happy Birthday, Miss Niria 💜</h1>

    <div class="heart"></div>

    <p>You are not just a teacher,</p>
    <p>you are an inspiration ✨</p>

    <p>Thank you for your kindness and dedication 💜</p>

    <p><b>Have a magical and beautiful day!</b> 🎂</p>
</div>

</body>
</html>
